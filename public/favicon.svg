<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e3a5f"/>
  <!-- Simplified control chart: center line -->
  <line x1="4" y1="20" x2="28" y2="20" stroke="#4a90d9" stroke-width="1" stroke-dasharray="2 1"/>
  <!-- UCL -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="2 1" opacity="0.7"/>
  <!-- LCL -->
  <line x1="4" y1="26" x2="28" y2="26" stroke="#f97316" stroke-width="0.8" stroke-dasharray="2 1" opacity="0.7"/>
  <!-- Data line with spike -->
  <polyline
    points="4,21 8,19 11,20 14,18 17,22 20,8 23,19 26,20 28,21"
    stroke="#60a5fa"
    stroke-width="1.5"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Dots -->
  <circle cx="4"  cy="21" r="1.2" fill="#60a5fa"/>
  <circle cx="8"  cy="19" r="1.2" fill="#60a5fa"/>
  <circle cx="11" cy="20" r="1.2" fill="#60a5fa"/>
  <circle cx="14" cy="18" r="1.2" fill="#60a5fa"/>
  <circle cx="17" cy="22" r="1.2" fill="#60a5fa"/>
  <!-- Spike point (red = violation) -->
  <circle cx="20" cy="8"  r="1.8" fill="#ef4444"/>
  <circle cx="23" cy="19" r="1.2" fill="#60a5fa"/>
  <circle cx="26" cy="20" r="1.2" fill="#60a5fa"/>
  <circle cx="28" cy="21" r="1.2" fill="#60a5fa"/>
</svg>
